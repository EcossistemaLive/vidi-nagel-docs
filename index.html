<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViDI - Nagel & Aloe medicina</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg-color: #05070A;
            --surface-color: #0D1117;
            --border-color: rgba(197,160,89, 0.15);
            --accent-primary: #C5A059;
            --accent-light: #E2C882;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-image: linear-gradient(rgba(197,160,89,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(197,160,89,.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 90%;
            text-align: center;
        }

        .logo { max-height: 70px; margin-bottom: 2rem; animation: fadeInDown 0.8s ease-out; }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-primary);
            margin-bottom: 4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: fadeInDown 0.8s ease-out 0.2s both;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.8s ease-out 0.4s both;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(197,160,89, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--accent-light);
        }

        .card p { color: var(--text-secondary); font-size: 1.05rem; line-height: 1.5; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="vidi_logo.png" alt="ViDI Logo" class="logo">
        <p class="subtitle">Portal de Estratégia Corporativa — Nagel & Aloe medicina</p>
        
        <div class="cards">
            <a href="proposta.html" class="card">
                <h2>Proposta Operacional</h2>
                <p>Plano de diagnóstico, mapeamento jurídico e reestruturação de Go-To-Market.</p>
            </a>
            
            <a href="apresentacao.html" class="card">
                <h2>Estudo de Caso</h2>
                <p>O playbook prático da ViDI (10 passos de tração) detalhado de forma didática.</p>
            </a>
        </div>
    </div>
</body>
</html>
